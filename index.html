<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MugShopp - 365 Motivos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: #ffffff;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      min-height: 100vh;
      padding: 40px 20px;
      overflow: hidden;
      position: relative;
    }

    /* Cabeçalho ajustado para preto */
    .status-bar { width: 100%; display: flex; justify-content: space-between; max-width: 400px; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: #1a1a1a; font-weight: 600; z-index: 10; }

    .header { text-align: center; z-index: 10; }
    .arte-principal { width: 252px; margin-top: 20px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.03)); }

    .frase-container { width: 100%; max-width: 500px; text-align: center; z-index: 10; padding: 0 15px; }
    .frase { font-family: "Cormorant Garamond", serif; font-style: italic; font-weight: 300; font-size: 28px; line-height: 1.5; background: linear-gradient(to right, #1a1a1a 20%, #bf9a5a 40%, #e2c285 50%, #bf9a5a 60%, #1a1a1a 80%); background-size: 200% auto; color: transparent; -webkit-background-clip: text; background-clip: text; animation: brilhoDourado 5s linear infinite, revealText 1.5s ease forwards; }

    @keyframes brilhoDourado { to { background-position: 200% center; } }
    @keyframes revealText { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .footer { text-align: center; z-index: 10; width: 100%; padding-bottom: 20px; }
    
    .btn-discreto { background: none; border: none; color: #bf9a5a; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; margin-bottom: 20px; opacity: 0.7; transition: 0.3s; }
    .btn-discreto:hover { opacity: 1; }

    /* Rodapé ajustado para preto */
    .info-rodape { font-size: 8px; color: #1a1a1a; letter-spacing: 1px; text-transform: uppercase; margin-top: 10px; }

    .particle { 
        position: absolute; 
        pointer-events: none; 
        z-index: 1; 
        opacity: 0.7; 
        animation: floatUp 8s linear infinite; 
    }
    
    @keyframes floatUp {
      0% { transform: translateY(100vh); opacity: 0; }
      10% { opacity: 0.7; }
      90% { opacity: 0.7; }
      100% { transform: translateY(0vh); opacity: 0; }
    }
    
    #particle-field { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; pointer-events: none; }
  </style>
</head>
<body>

  <div id="particle-field"></div>

  <div class="status-bar">
    <span id="relogio">00:00</span>
    <span id="contador-dia">Motivo: --</span>
  </div>

  <div class="header">
    <img class="arte-principal" src="https://i.postimg.cc/0QYT04rQ/365-Motivos-20260528-075235-0000.png" alt="365 Motivos">
  </div>

  <div class="frase-container">
    <p class="frase" id="frase-display">Carregando...</p>
  </div>

  <div class="footer">
    <button class="btn-discreto" onclick="controleAudio()" id="btn-txt">Ativar Trilha</button>
    <p class="info-rodape">Feito com carinho por: MugShopp - Estúdio de Design e Personalizados - Taubaté/SP - (12) 99243.9101</p>
  </div>

  <audio id="musica" loop><source src="You're Still The One.mp3" type="audio/mpeg"></audio>

  <script>
    async function carregarFrases() {
      try {
        const response = await fetch('namorados.txt');
        if (!response.ok) throw new Error('Erro ao carregar');
        const text = await response.text();
        const frases = text.split('\n').filter(f => f.trim() !== '');
        const dia = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 864e5) - 1;
        document.getElementById('frase-display').textContent = frases[dia % frases.length] || "Um motivo especial para hoje.";
      } catch (e) {
        document.getElementById('frase-display').textContent = "Aproveite cada momento do seu dia.";
      }
    }

    function atualizar() {
      const agora = new Date();
      document.getElementById('relogio').textContent = agora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      const dia = Math.floor((agora - new Date(agora.getFullYear(), 0, 0)) / 864e5);
      document.getElementById('contador-dia').textContent = `Motivo: ${dia}`;
    }
    
    function criarParticulas() {
      const cont = document.getElementById('particle-field');
      for (let i = 0; i < 15; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="#bf9a5a"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (7 + Math.random() * 5) + 's';
        p.style.animationDelay = (Math.random() * 8) + 's';
        cont.appendChild(p);
      }
    }

    function controleAudio() {
      const m = document.getElementById('musica');
      const b = document.getElementById('btn-txt');
      if (m.paused) { m.play(); b.textContent = "Pausar Trilha"; }
      else { m.pause(); b.textContent = "Ativar Trilha"; }
    }

    setInterval(atualizar, 1000);
    atualizar();
    criarParticulas();
    carregarFrases();
  </script>
</body>
</html>
