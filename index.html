<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>365 Motivos - MugShopp</title>
  <style>
    /* Reset básico */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #ffffff; /* Branco puro para sumir com as bordas das fotos */
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    .topo-texto {
      font-size: 10px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #bf9a5a;
      margin-bottom: 30px;
      font-weight: 300;
    }

    .img-principal {
      width: 180px;
      margin-bottom: 50px;
      /* Sem sombras pesadas para manter o clean */
    }

    /* Card da Frase: Minimalismo puro */
    .container-frase {
      width: 100%;
      max-width: 450px;
      padding: 20px;
      text-align: center;
      margin-bottom: 50px;
      position: relative;
    }

    .frase {
      /* Fonte leve, fina e elegante */
      font-family: 'Times New Roman', serif; /* Ou uma Thin Sans-serif */
      font-style: italic;
      font-weight: 300;
      font-size: 24px;
      line-height: 1.6;
      color: #1a1a1a;
      opacity: 0;
      transform: translateY(10px);
      animation: suaveEntrada 1.5s ease forwards;
    }

    @keyframes suaveEntrada {
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-assinatura {
      width: 150px;
      margin-bottom: 40px;
    }

    /* Botão Estilo Premium (Apple/Adidas) */
    .btn-musica {
      background: #1a1a1a;
      color: #bf9a5a;
      border: none;
      padding: 15px 40px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-radius: 50px; /* Botão arredondado */
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); /* Sombra suave */
      transition: all 0.3s ease;
      z-index: 10;
    }

    .btn-musica:active {
      transform: scale(0.95);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    /* Partículas de Amor (Sutis) */
    .particula {
      position: absolute;
      pointer-events: none;
      opacity: 0.4;
      z-index: 0;
      animation: subir 10s linear infinite;
    }

    @keyframes subir {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      20% { opacity: 0.4; }
      100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="topo-texto">Coleção Exclusiva</div>

  <img class="img-principal" src="https://i.postimg.cc/T11xRxrs/Photoroom-20250525-221951618.png" alt="365 Motivos">

  <div class="container-frase">
    <p class="frase" id="frase">"Aguardando sua mensagem de amor..."</p>
  </div>

  <img class="logo-assinatura" src="https://i.postimg.cc/T190pkF7/Copia-de-Novo-Logotipo-2026-20260127-183120-0000.png" alt="MugShopp">

  <button class="btn-musica" onclick="controlarMusica()" id="btn-txt">Ativar Música</button>

  <audio id="player" loop>
    <source src="You're Still The One.mp3" type="audio/mpeg">
  </audio>

  <div id="container-particulas"></div>

  <script>
    // Sistema de frases e áudio simplificado e elegante
    const frasesDefault = ["Porque seu sorriso ilumina meu dia.", "Pelo seu jeito único de me fazer feliz."];

    async function iniciar() {
      const el = document.getElementById('frase');
      try {
        const res = await fetch('namorados.txt');
        const txt = await res.text();
        const frases = txt.split('\n').filter(f => f.trim());
        const dia = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 1)) / 864e5);
        el.textContent = `"${frases[dia % frases.length]}"`;
      } catch {
        el.textContent = `"${frasesDefault[0]}"`;
      }
      criarCoracoes();
    }

    function controlarMusica() {
      const p = document.getElementById('player');
      const b = document.getElementById('btn-txt');
      if(p.paused) { p.play(); b.textContent = "Pausar Música"; }
      else { p.pause(); b.textContent = "Ativar Música"; }
    }

    function criarCoracoes() {
      const cont = document.getElementById('container-particulas');
      for(let i=0; i<12; i++) {
        const h = document.createElement('div');
        h.className = 'particula';
        h.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="%23bf9a5a" style="fill: #bf9a5a; opacity: 0.5;"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
        h.style.left = Math.random() * 100 + '%';
        h.style.animationDuration = (8 + Math.random() * 10) + 's';
        h.style.animationDelay = Math.random() * 5 + 's';
        cont.appendChild(h);
      }
    }
    iniciar();
  </script>
</body>
</html>
